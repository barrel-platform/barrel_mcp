name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile:
    name: Compile / OTP ${{ matrix.otp }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        otp: ['27', '28']
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3.24'
      - name: Restore rebar3 cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/rebar3
            _build
          key: ${{ runner.os }}-rebar3-${{ matrix.otp }}-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            ${{ runner.os }}-rebar3-${{ matrix.otp }}-
      - name: Compile
        run: rebar3 compile

  tests:
    name: Tests / OTP ${{ matrix.otp }}
    needs: compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        otp: ['27', '28']
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3.24'
      - name: Restore rebar3 cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/rebar3
            _build
          key: ${{ runner.os }}-rebar3-${{ matrix.otp }}-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            ${{ runner.os }}-rebar3-${{ matrix.otp }}-
      - name: Run eunit
        run: rebar3 eunit
      - name: Run common_test (snippet check + suites)
        run: rebar3 ct

  examples:
    name: Examples / OTP ${{ matrix.otp }}
    needs: compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        otp: ['27', '28']
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3.24'
      - name: Set up _checkouts symlinks
        run: make examples-setup
      - name: Run example suites
        run: make examples-test

  interop:
    name: Python interop / OTP ${{ matrix.otp }}
    needs: compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        otp: ['28']
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3.24'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Restore rebar3 cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/rebar3
            _build
          key: ${{ runner.os }}-rebar3-${{ matrix.otp }}-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            ${{ runner.os }}-rebar3-${{ matrix.otp }}-
      - name: Run Python interop tests
        run: make interop-test

  check:
    name: Check / OTP ${{ matrix.otp }}
    needs: compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        otp: ['27', '28']
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3.24'
      - name: Restore rebar3 cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/rebar3
            _build
          key: ${{ runner.os }}-rebar3-${{ matrix.otp }}-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            ${{ runner.os }}-rebar3-${{ matrix.otp }}-
      - name: Restore PLT cache
        uses: actions/cache@v4
        with:
          path: _build/default/*_plt
          key: ${{ runner.os }}-plt-${{ matrix.otp }}-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-${{ matrix.otp }}-
      - name: Run xref
        run: rebar3 xref
      - name: Run dialyzer
        run: rebar3 dialyzer
